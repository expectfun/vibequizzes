<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>vibe quizzes</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --bg-soft: #12121a;
      --neon: #00f5ff;
      --neon-dim: rgba(0, 245, 255, 0.5);
      --border: rgba(255, 255, 255, 0.2);
      --text: #e0e0e8;
      --text-dim: #808098;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 90% 60% at 50% 0%, rgba(0, 245, 255, 0.04) 0%, transparent 55%),
        radial-gradient(ellipse 70% 50% at 100% 100%, rgba(0, 245, 255, 0.025) 0%, transparent 50%),
        linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
      background-position: 0 0, 0 0, 0 0, 0 0;
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 2.5rem 2rem 2rem;
    }
    h1 {
      margin: 0 0 0.25rem;
      font-size: 2.5rem;
      font-weight: 600;
      color: var(--text);
    }
    .tagline {
      margin: 0 0 1.5rem;
      font-size: 0.95rem;
      color: var(--text-dim);
      font-weight: 400;
    }
    .quizzes {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-width: 360px;
      width: 100%;
    }
    .quizzes a {
      display: block;
      padding: 1rem 1.25rem;
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      text-decoration: none;
      font-size: 1rem;
      transition: border-color 0.2s, color 0.2s, box-shadow 0.2s;
    }
    .quizzes a:hover {
      border-color: var(--neon);
      color: var(--neon);
      box-shadow: 0 0 16px var(--neon-dim);
    }
    .quizzes a:focus {
      outline: none;
      border-color: var(--neon);
      box-shadow: 0 0 0 2px var(--bg), 0 0 16px var(--neon-dim);
    }
  </style>
</head>
<body>
  <h1>vibe quizzes</h1>
  <p class="tagline">Geography quizzes on the map.</p>
  <nav class="quizzes">
    <a href="africa.html">Countries of Africa</a>
    <a href="south-america.html">Countries of South America</a>
    <a href="asia.html">Countries of Asia</a>
  </nav>
</body>
</html>
