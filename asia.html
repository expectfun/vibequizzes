<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Asia Countries Quiz</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --bg-soft: #12121a;
      --neon-named: #00f5ff;
      --neon-named-fill: rgba(0, 245, 255, 0.18);
      --neon-last: #ff00aa;
      --neon-last-fill: rgba(255, 0, 170, 0.25);
      --border-visible: rgba(255, 255, 255, 0.2);
      --text: #e0e0e8;
      --text-dim: #808098;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      max-height: 100vh;
      background: #010b26;
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0.5rem 1rem;
      overflow: hidden;
    }
    body.mode-2 {
      background: var(--bg);
    }
    h1 { margin: 0 0 1.25rem; font-size: 2.5rem; font-weight: 600; }
    .modes { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; flex-wrap: wrap; justify-content: center; }
    .modes button {
      padding: 0.5rem 1rem;
      background: var(--bg-soft);
      border: 1px solid var(--border-visible);
      color: var(--text);
      cursor: pointer;
      border-radius: 6px;
      font-size: 0.9rem;
    }
    .modes button:hover { border-color: var(--neon-named); color: var(--neon-named); }
    .modes button.active {
      border-color: var(--neon-named);
      color: var(--neon-named);
      box-shadow: 0 0 12px rgba(0, 245, 255, 0.3);
    }
    .map-wrap {
      width: 100%;
      flex: 1 1 0;
      min-height: 0;
      background: #010b26;
      border-radius: 12px;
      padding: 0.25rem;
      margin-bottom: 0;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }
    body.mode-2 .map-wrap {
      background: var(--bg);
    }
    .map-wrap svg {
      width: 100%;
      height: 100%;
      display: block;
    }
    .country {
      fill: var(--bg);
      stroke: none;
      transition: stroke 0.25s, filter 0.25s, fill 0.25s;
    }
    body.mode-1 .country { stroke: var(--border-visible); stroke-width: 0.5; }
    body.mode-2 .country { stroke: transparent; stroke-width: 0.5; }
    body.mode-2 .country.named { stroke: var(--neon-named); }
    body.mode-3 .country { stroke: var(--border-visible); stroke-width: 0.5; }
    .country.named {
      fill: var(--neon-named-fill);
      stroke: var(--neon-named);
      stroke-width: 1;
      filter: drop-shadow(0 0 6px var(--neon-named));
    }
    .country.last-named {
      fill: var(--neon-last-fill);
      stroke: var(--neon-last);
      stroke-width: 1.5;
      filter: drop-shadow(0 0 10px var(--neon-last)) drop-shadow(0 0 20px rgba(255, 0, 170, 0.4));
    }
    .country-label {
      display: none;
      pointer-events: none;
      fill: var(--neon-named);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-weight: 600;
      transition: fill 0.2s;
    }
    .country-label.named { display: block; }
    .country-label.last-named { fill: var(--neon-last); }
    .input-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.25rem;
      max-width: 400px;
      width: 100%;
    }
    .input-row input {
      flex: 1;
      padding: 0.6rem 0.8rem;
      background: var(--bg-soft);
      border: 1px solid var(--border-visible);
      border-radius: 6px;
      color: var(--text);
      font-size: 1rem;
    }
    .input-row input:focus {
      outline: none;
      border-color: var(--neon-named);
      box-shadow: 0 0 8px rgba(0, 245, 255, 0.2);
    }
    .input-row button {
      padding: 0.6rem 1.2rem;
      background: var(--neon-named);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }
    .input-row button:hover { filter: brightness(1.1); }
    #giveup-btn { background: transparent; color: var(--text-dim); border: 1px solid var(--border-visible); white-space: nowrap; }
    #giveup-btn:hover { color: var(--neon-last); border-color: var(--neon-last); }
    .score { font-size: 1.1rem; margin-bottom: 0; color: var(--text-dim); }
    .message { min-height: 1em; color: var(--neon-named); font-size: 0.95rem; margin-top: 0.125rem; }
    .message.error { color: #ff6b6b; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
    .back-bar { width: 100%; max-width: 900px; margin: 0 0 0.5rem 0; flex-shrink: 0; }
    .back-link { font-size: 0.8rem; color: var(--text-dim); text-decoration: none; opacity: 0.8; transition: color 0.2s, opacity 0.2s; }
    .back-link:hover { color: var(--neon-named); opacity: 1; }
  </style>
</head>

  <script>
(function() {
  const COUNTRIES = ["Kazakhstan","Uzbekistan","Indonesia","East Timor","Israel","Lebanon","Palestine","Jordan","United Arab Emirates","Qatar","Kuwait","Iraq","Oman","Cambodia","Thailand","Laos","Myanmar","Vietnam","North Korea","South Korea","Mongolia","India","Bangladesh","Bhutan","Nepal","Pakistan","Afghanistan","Tajikistan","Kyrgyzstan","Turkmenistan","Iran","Syria","Armenia","Turkey","Sri Lanka","China","Taiwan","Azerbaijan","Georgia","Philippines","Malaysia","Brunei","Japan","Yemen","Saudi Arabia","Cyprus"];
  const ALIASES = {"afghanistan":"Afghanistan","арганистан":"Afghanistan","armenia":"Armenia","армения":"Armenia","azerbaijan":"Azerbaijan","азербайджан":"Azerbaijan","bangladesh":"Bangladesh","бангладеш":"Bangladesh","bhutan":"Bhutan","бутан":"Bhutan","brunei":"Brunei","бруней":"Brunei","cambodia":"Cambodia","камбоджа":"Cambodia","china":"China","китай":"China","cyprus":"Cyprus","кипр":"Cyprus","east timor":"East Timor","timor-leste":"East Timor","тимор":"East Timor","georgia":"Georgia","грузия":"Georgia","india":"India","индия":"India","indonesia":"Indonesia","индонезия":"Indonesia","iran":"Iran","иран":"Iran","iraq":"Iraq","ирак":"Iraq","israel":"Israel","израиль":"Israel","japan":"Japan","япония":"Japan","jordan":"Jordan","иордания":"Jordan","kazakhstan":"Kazakhstan","казахстан":"Kazakhstan","kuwait":"Kuwait","кувейт":"Kuwait","kyrgyzstan":"Kyrgyzstan","киргизия":"Kyrgyzstan","киргизстан":"Kyrgyzstan","laos":"Laos","лаос":"Laos","lebanon":"Lebanon","ливан":"Lebanon","malaysia":"Malaysia","малайзия":"Malaysia","mongolia":"Mongolia","монголия":"Mongolia","myanmar":"Myanmar","burma":"Myanmar","мьянма":"Myanmar","бирма":"Myanmar","nepal":"Nepal","непал":"Nepal","north korea":"North Korea","dprk":"North Korea","кндр":"North Korea","oman":"Oman","оман":"Oman","pakistan":"Pakistan","пакистан":"Pakistan","palestine":"Palestine","палестина":"Palestine","philippines":"Philippines","филиппины":"Philippines","qatar":"Qatar","катар":"Qatar","saudi arabia":"Saudi Arabia","saudi":"Saudi Arabia","саудовская аравия":"Saudi Arabia","south korea":"South Korea","korea":"South Korea","республика корея":"South Korea","sri lanka":"Sri Lanka","шри-ланка":"Sri Lanka","syria":"Syria","сирия":"Syria","taiwan":"Taiwan","тайвань":"Taiwan","tajikistan":"Tajikistan","таджикистан":"Tajikistan","thailand":"Thailand","таиланд":"Thailand","turkey":"Turkey","турция":"Turkey","turkmenistan":"Turkmenistan","туркменистан":"Turkmenistan","uae":"United Arab Emirates","united arab emirates":"United Arab Emirates","оаэ":"United Arab Emirates","uzbekistan":"Uzbekistan","узбекистан":"Uzbekistan","vietnam":"Vietnam","вьетнам":"Vietnam","yemen":"Yemen","йемен":"Yemen"};
  const NEIGHBORS = {"Afghanistan":["China","Iran","Pakistan","Tajikistan","Turkmenistan","Uzbekistan"],"Armenia":["Azerbaijan","Georgia","Iran","Turkey"],"Azerbaijan":["Armenia","Georgia","Iran","Turkey"],"Bangladesh":["India","Myanmar"],"Bhutan":["China","India"],"Brunei":["Malaysia"],"Cambodia":["Laos","Thailand","Vietnam"],"China":["Afghanistan","Bhutan","India","Kazakhstan","Kyrgyzstan","Laos","Mongolia","Myanmar","Nepal","North Korea","Pakistan","Tajikistan","Vietnam"],"Cyprus":[],"East Timor":["Indonesia"],"Georgia":["Armenia","Azerbaijan","Turkey"],"India":["Bangladesh","Bhutan","China","Myanmar","Nepal","Pakistan"],"Indonesia":["East Timor","Malaysia"],"Iran":["Afghanistan","Armenia","Azerbaijan","Iraq","Pakistan","Turkey","Turkmenistan"],"Iraq":["Iran","Israel","Jordan","Kuwait","Saudi Arabia","Syria","Turkey"],"Israel":["Jordan","Lebanon","Palestine","Syria"],"Japan":[],"Jordan":["Iraq","Israel","Palestine","Saudi Arabia","Syria"],"Kazakhstan":["China","Kyrgyzstan","Turkmenistan","Uzbekistan"],"Kuwait":["Iraq","Saudi Arabia"],"Kyrgyzstan":["China","Kazakhstan","Tajikistan","Uzbekistan"],"Laos":["Cambodia","China","Myanmar","Thailand","Vietnam"],"Lebanon":["Israel","Syria"],"Malaysia":["Brunei","Indonesia","Thailand"],"Mongolia":["China"],"Myanmar":["Bangladesh","China","India","Laos","Thailand"],"Nepal":["China","India"],"North Korea":["China","South Korea"],"Oman":["Saudi Arabia","United Arab Emirates","Yemen"],"Pakistan":["Afghanistan","China","India","Iran"],"Palestine":["Israel","Jordan"],"Philippines":[],"Qatar":["Saudi Arabia"],"Saudi Arabia":["Iraq","Jordan","Kuwait","Oman","Qatar","United Arab Emirates","Yemen"],"South Korea":["North Korea"],"Sri Lanka":[],"Syria":["Iraq","Israel","Jordan","Lebanon","Turkey"],"Taiwan":[],"Tajikistan":["Afghanistan","China","Kyrgyzstan","Uzbekistan"],"Thailand":["Cambodia","Laos","Malaysia","Myanmar"],"Turkey":["Armenia","Azerbaijan","Georgia","Iran","Iraq","Syria"],"Turkmenistan":["Afghanistan","Iran","Kazakhstan","Uzbekistan"],"United Arab Emirates":["Oman","Saudi Arabia"],"Uzbekistan":["Afghanistan","Kazakhstan","Kyrgyzstan","Tajikistan","Turkmenistan"],"Vietnam":["Cambodia","China","Laos"],"Yemen":["Oman","Saudi Arabia"]};

  function normalize(s) {
    return (s || '').trim().toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  }

  function findCountry(input) {
    const n = normalize(input);
    if (!n) return null;
    if (ALIASES[n]) return ALIASES[n];
    const exact = COUNTRIES.find(c => normalize(c) === n);
    if (exact) return exact;
    return COUNTRIES.find(c => normalize(c).indexOf(n) === 0 || n.indexOf(normalize(c)) === 0) || null;
  }

  let state = { named: new Set(), lastNamed: null, mode: 1 };
  const START_PROMPT = 'Name any Asian country to start';

  const body = document.body;
  const input = document.getElementById('country-input');
  const submitBtn = document.getElementById('submit-btn');
  const giveupBtn = document.getElementById('giveup-btn');
  const scoreEl = document.querySelector('.score');
  const messageEl = document.getElementById('message');

  function setMessage(text, isError) {
    messageEl.textContent = text;
    messageEl.classList.toggle('error', !!isError);
  }

  function pathId(name) {
    return 'path-' + name.replace(/\s+/g, '-').replace(/[^\w-]/g, '');
  }

  function updateMap() {
    COUNTRIES.forEach(name => {
      const pid = pathId(name);
      const el = document.getElementById(pid);
      const labelEl = document.getElementById('label-' + pid);
      if (el) {
        el.classList.remove('named', 'last-named');
        if (state.named.has(name)) {
          el.classList.add('named');
          if (name === state.lastNamed) el.classList.add('last-named');
        }
      }
      if (labelEl) {
        labelEl.classList.remove('named', 'last-named');
        if (state.named.has(name)) {
          labelEl.classList.add('named');
          if (name === state.lastNamed) labelEl.classList.add('last-named');
        }
      }
    });
    const total = COUNTRIES.length;
    scoreEl.textContent = state.named.size + ' / ' + total;
  }

  function setMode(mode) {
    state.mode = mode;
    state.named = new Set();
    state.lastNamed = null;
    body.className = 'mode-' + mode;
    document.querySelectorAll('.modes button').forEach(b => {
      b.classList.toggle('active', parseInt(b.dataset.mode, 10) === mode);
    });
    updateMap();
    setMessage(START_PROMPT);
    input.focus();
  }

  function submit() {
    const raw = input.value.trim();
    if (!raw) return;
    const country = findCountry(raw);
    if (!country) {
      setMessage('Wrong or unknown country', true);
      return;
    }
    if (state.mode === 3) {
      if (state.named.size === 0) {
        state.named.add(country);
        state.lastNamed = country;
        setMessage('Now name a country that borders ' + country);
      } else {
        const adj = NEIGHBORS[state.lastNamed];
        if (!adj || !adj.includes(country)) {
          setMessage('Must border ' + state.lastNamed, true);
          return;
        }
        if (state.named.has(country)) {
          setMessage('Already named', true);
          return;
        }
        state.named.add(country);
        state.lastNamed = country;
        setMessage('Correct! Next must border ' + country);
      }
    } else {
      if (state.named.has(country)) {
        setMessage('Already named', true);
        return;
      }
      state.named.add(country);
      state.lastNamed = country;
      setMessage('Correct!');
    }
    input.value = '';
    updateMap();
    input.focus();
  }

  document.querySelectorAll('.modes button').forEach(btn => {
    btn.addEventListener('click', () => setMode(parseInt(btn.dataset.mode, 10)));
  });
  submitBtn.addEventListener('click', submit);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
  giveupBtn.addEventListener('click', function giveUp() {
    state.named = new Set(COUNTRIES);
    state.lastNamed = null;
    updateMap();
    setMessage('All countries revealed');
    input.disabled = true;
    submitBtn.disabled = true;
    giveupBtn.disabled = true;
  });

  setMode(1);
})();
  </script>
