<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Europe Countries Quiz</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --bg-soft: #12121a;
      --neon-named: #00f5ff;
      --neon-named-fill: rgba(0, 245, 255, 0.18);
      --neon-last: #ff00aa;
      --neon-last-fill: rgba(255, 0, 170, 0.25);
      --border-visible: rgba(255, 255, 255, 0.2);
      --text: #e0e0e8;
      --text-dim: #808098;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      max-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0.5rem 1rem;
      overflow: hidden;
    }
    h1 { margin: 0 0 0.25rem; font-size: 1.5rem; font-weight: 600; }
    .modes { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; flex-wrap: wrap; justify-content: center; }
    .modes button {
      padding: 0.5rem 1rem;
      background: var(--bg-soft);
      border: 1px solid var(--border-visible);
      color: var(--text);
      cursor: pointer;
      border-radius: 6px;
      font-size: 0.9rem;
    }
    .modes button:hover { border-color: var(--neon-named); color: var(--neon-named); }
    .modes button.active {
      border-color: var(--neon-named);
      color: var(--neon-named);
      box-shadow: 0 0 12px rgba(0, 245, 255, 0.3);
    }
    .map-wrap {
      width: 100%;
      flex: 1 1 0;
      min-height: 0;
      background: var(--bg);
      border-radius: 12px;
      padding: 0.25rem;
      margin-bottom: 0;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }
    .map-wrap svg {
      width: 100%;
      height: 100%;
      display: block;
    }
    .country {
      fill: var(--bg);
      stroke: none;
      transition: stroke 0.25s, filter 0.25s, fill 0.25s;
    }
    body.mode-1 .country { stroke: var(--border-visible); stroke-width: 0.5; }
    body.mode-2 .country { stroke: transparent; stroke-width: 0.5; }
    body.mode-2 .country.named { stroke: var(--neon-named); }
    body.mode-3 .country { stroke: var(--border-visible); stroke-width: 0.5; }
    .country.named {
      fill: var(--neon-named-fill);
      stroke: var(--neon-named);
      stroke-width: 1;
      filter: drop-shadow(0 0 6px var(--neon-named));
    }
    .country.last-named {
      fill: var(--neon-last-fill);
      stroke: var(--neon-last);
      stroke-width: 1.5;
      filter: drop-shadow(0 0 10px var(--neon-last)) drop-shadow(0 0 20px rgba(255, 0, 170, 0.4));
    }
    .country-label {
      display: none;
      pointer-events: none;
      fill: var(--neon-named);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-weight: 600;
      transition: fill 0.2s;
    }
    .country-label.named { display: block; }
    .country-label.last-named { fill: var(--neon-last); }
    .input-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.25rem;
      max-width: 400px;
      width: 100%;
    }
    .input-row input {
      flex: 1;
      padding: 0.6rem 0.8rem;
      background: var(--bg-soft);
      border: 1px solid var(--border-visible);
      border-radius: 6px;
      color: var(--text);
      font-size: 1rem;
    }
    .input-row input:focus {
      outline: none;
      border-color: var(--neon-named);
      box-shadow: 0 0 8px rgba(0, 245, 255, 0.2);
    }
    .input-row button {
      padding: 0.6rem 1.2rem;
      background: var(--neon-named);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }
    .input-row button:hover { filter: brightness(1.1); }
    #giveup-btn { background: transparent; color: var(--text-dim); border: 1px solid var(--border-visible); white-space: nowrap; }
    #giveup-btn:hover { color: var(--neon-last); border-color: var(--neon-last); }
    .score { font-size: 1.1rem; margin-bottom: 0; color: var(--text-dim); }
    .message { min-height: 1em; color: var(--neon-named); font-size: 0.95rem; margin-top: 0.125rem; }
    .message.error { color: #ff6b6b; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
  </style>
</head>

  <script>
(function() {
  const COUNTRIES = ["Russia","Norway","France","Sweden","Belarus","Ukraine","Poland","Austria","Hungary","Moldova","Romania","Lithuania","Latvia","Estonia","Germany","Bulgaria","Greece","Albania","Croatia","Switzerland","Luxembourg","Belgium","Netherlands","Portugal","Spain","Ireland","Italy","Denmark","United Kingdom","Iceland","Slovenia","Finland","Slovakia","Czechia","Bosnia and Herzegovina","North Macedonia","Republic of Serbia","Montenegro","Kosovo"];
  const ALIASES = {"albania":"Albania","austria":"Austria","belarus":"Belarus","belgium":"Belgium","bosnia":"Bosnia and Herzegovina","bosnia and herzegovina":"Bosnia and Herzegovina","bulgaria":"Bulgaria","croatia":"Croatia","czechia":"Czechia","czech republic":"Czechia","denmark":"Denmark","estonia":"Estonia","finland":"Finland","france":"France","germany":"Germany","greece":"Greece","hungary":"Hungary","iceland":"Iceland","ireland":"Ireland","italy":"Italy","kosovo":"Kosovo","latvia":"Latvia","lithuania":"Lithuania","luxembourg":"Luxembourg","moldova":"Moldova","montenegro":"Montenegro","netherlands":"Netherlands","north macedonia":"North Macedonia","macedonia":"North Macedonia","norway":"Norway","poland":"Poland","portugal":"Portugal","serbia":"Republic of Serbia","republic of serbia":"Republic of Serbia","romania":"Romania","russia":"Russia","slovakia":"Slovakia","slovenia":"Slovenia","spain":"Spain","sweden":"Sweden","switzerland":"Switzerland","ukraine":"Ukraine","united kingdom":"United Kingdom","uk":"United Kingdom","great britain":"United Kingdom","england":"United Kingdom","scotland":"United Kingdom","wales":"United Kingdom"};
  const NEIGHBORS = {"Albania":["Montenegro","Kosovo","North Macedonia","Greece"],"Austria":["Germany","Czechia","Slovakia","Hungary","Slovenia","Italy","Switzerland"],"Belarus":["Russia","Latvia","Lithuania","Poland","Ukraine"],"Belgium":["France","Luxembourg","Germany","Netherlands"],"Bosnia and Herzegovina":["Croatia","Republic of Serbia","Montenegro"],"Bulgaria":["Romania","Republic of Serbia","North Macedonia","Greece"],"Croatia":["Slovenia","Hungary","Republic of Serbia","Bosnia and Herzegovina","Montenegro"],"Czechia":["Germany","Poland","Slovakia","Austria"],"Denmark":["Germany"],"Estonia":["Russia","Latvia"],"Finland":["Norway","Russia","Sweden"],"France":["Spain","Belgium","Luxembourg","Germany","Switzerland","Italy"],"Germany":["Denmark","Poland","Czechia","Austria","Switzerland","France","Luxembourg","Belgium","Netherlands"],"Greece":["Albania","North Macedonia","Bulgaria"],"Hungary":["Slovakia","Ukraine","Romania","Republic of Serbia","Croatia","Slovenia","Austria"],"Iceland":[],"Ireland":[],"Italy":["France","Switzerland","Austria","Slovenia"],"Kosovo":["Republic of Serbia","North Macedonia","Albania","Montenegro"],"Latvia":["Estonia","Russia","Belarus","Lithuania"],"Lithuania":["Latvia","Belarus","Poland","Russia"],"Luxembourg":["Belgium","Germany","France"],"Moldova":["Ukraine","Romania"],"Montenegro":["Croatia","Bosnia and Herzegovina","Republic of Serbia","Kosovo","Albania"],"Netherlands":["Germany","Belgium"],"North Macedonia":["Republic of Serbia","Bulgaria","Greece","Albania","Kosovo"],"Norway":["Russia","Sweden","Finland"],"Poland":["Russia","Lithuania","Belarus","Ukraine","Slovakia","Czechia","Germany"],"Portugal":["Spain"],"Republic of Serbia":["Hungary","Romania","Bulgaria","North Macedonia","Kosovo","Montenegro","Bosnia and Herzegovina","Croatia"],"Romania":["Ukraine","Moldova","Hungary","Republic of Serbia","Bulgaria"],"Russia":["Norway","Finland","Estonia","Latvia","Lithuania","Poland","Belarus","Ukraine"],"Slovakia":["Poland","Ukraine","Hungary","Austria","Czechia"],"Slovenia":["Austria","Italy","Hungary","Croatia"],"Spain":["France","Portugal"],"Sweden":["Norway","Finland"],"Switzerland":["Germany","France","Italy","Austria"],"Ukraine":["Russia","Belarus","Poland","Slovakia","Hungary","Romania","Moldova"],"United Kingdom":[]};

  function normalize(s) {
    return (s || '').trim().toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  }

  function findCountry(input) {
    const n = normalize(input);
    if (!n) return null;
    if (ALIASES[n]) return ALIASES[n];
    const exact = COUNTRIES.find(c => normalize(c) === n);
    if (exact) return exact;
    return COUNTRIES.find(c => normalize(c).indexOf(n) === 0 || n.indexOf(normalize(c)) === 0) || null;
  }

  let state = { named: new Set(), lastNamed: null, mode: 1 };

  const body = document.body;
  const input = document.getElementById('country-input');
  const submitBtn = document.getElementById('submit-btn');
  const giveupBtn = document.getElementById('giveup-btn');
  const scoreEl = document.querySelector('.score');
  const messageEl = document.getElementById('message');

  function setMessage(text, isError) {
    messageEl.textContent = text;
    messageEl.classList.toggle('error', !!isError);
  }

  function pathId(name) {
    return 'path-' + name.replace(/\s+/g, '-').replace(/[^\w-]/g, '');
  }

  function updateMap() {
    COUNTRIES.forEach(name => {
      const pid = pathId(name);
      const el = document.getElementById(pid);
      const labelEl = document.getElementById('label-' + pid);
      if (el) {
        el.classList.remove('named', 'last-named');
        if (state.named.has(name)) {
          el.classList.add('named');
          if (name === state.lastNamed) el.classList.add('last-named');
        }
      }
      if (labelEl) {
        labelEl.classList.remove('named', 'last-named');
        if (state.named.has(name)) {
          labelEl.classList.add('named');
          if (name === state.lastNamed) labelEl.classList.add('last-named');
        }
      }
    });
    const total = COUNTRIES.length;
    scoreEl.textContent = state.named.size + ' / ' + total;
  }

  function setMode(mode) {
    state.mode = mode;
    state.named = new Set();
    state.lastNamed = null;
    body.className = 'mode-' + mode;
    document.querySelectorAll('.modes button').forEach(b => {
      b.classList.toggle('active', parseInt(b.dataset.mode, 10) === mode);
    });
    updateMap();
    setMessage(mode === 3 ? 'Name any European country to start' : '');
    input.focus();
  }

  function submit() {
    const raw = input.value.trim();
    if (!raw) return;
    const country = findCountry(raw);
    if (!country) {
      setMessage('Wrong or unknown country', true);
      return;
    }
    if (state.mode === 3) {
      if (state.named.size === 0) {
        state.named.add(country);
        state.lastNamed = country;
        setMessage('Now name a country that borders ' + country);
      } else {
        const adj = NEIGHBORS[state.lastNamed];
        if (!adj || !adj.includes(country)) {
          setMessage('Must border ' + state.lastNamed, true);
          return;
        }
        if (state.named.has(country)) {
          setMessage('Already named', true);
          return;
        }
        state.named.add(country);
        state.lastNamed = country;
        setMessage('Correct! Next must border ' + country);
      }
    } else {
      if (state.named.has(country)) {
        setMessage('Already named', true);
        return;
      }
      state.named.add(country);
      state.lastNamed = country;
      setMessage('Correct!');
    }
    input.value = '';
    updateMap();
    input.focus();
  }

  document.querySelectorAll('.modes button').forEach(btn => {
    btn.addEventListener('click', () => setMode(parseInt(btn.dataset.mode, 10)));
  });
  submitBtn.addEventListener('click', submit);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
  giveupBtn.addEventListener('click', function giveUp() {
    state.named = new Set(COUNTRIES);
    state.lastNamed = null;
    updateMap();
    setMessage('All countries revealed');
    input.disabled = true;
    submitBtn.disabled = true;
    giveupBtn.disabled = true;
  });

  body.className = 'mode-1';
  updateMap();
})();
  </script>
